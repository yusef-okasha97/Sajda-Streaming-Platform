apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8spspforbiddenusers
  annotations:
    description: >-
      Controls the user and group IDs of the container. 
      Prevents running as root.
spec:
  crd:
    spec:
      names:
        kind: K8sPSPForbiddenUsers
      validation:
        openAPIV3Schema:
          type: object
          properties:
            users:
              type: array
              items:
                type: string
            runAsNonRoot:
              type: boolean
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8spspforbiddenusers

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not has_forbidden_user(container)
          msg := sprintf("Container <%v> is attempting to run as a forbidden user (root) or runAsNonRoot is not set to true", [container.name])
        }

        has_forbidden_user(container) {
          container.securityContext.runAsNonRoot == true
    
          container.securityContext.runAsUser > 0
        }

